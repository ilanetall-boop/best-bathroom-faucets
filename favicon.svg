<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <rect width="56" height="56" rx="12" fill="#004D40"/>
  <!-- Faucet base -->
  <rect x="24" y="36" width="8" height="10" rx="2" fill="#80CBC4"/>
  <!-- Faucet column -->
  <rect x="26" y="18" width="4" height="20" rx="2" fill="#B2DFDB"/>
  <!-- Faucet spout (curved) -->
  <path d="M30,18 C30,12 36,10 40,14 L40,20" stroke="#B2DFDB" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Water stream -->
  <line x1="40" y1="20" x2="40" y2="36" stroke="#4DD0E1" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  <!-- Water drops -->
  <circle cx="40" cy="38" r="2" fill="#4DD0E1" opacity="0.5"/>
  <circle cx="39" cy="42" r="1.5" fill="#4DD0E1" opacity="0.3"/>
  <!-- Handle -->
  <rect x="20" y="22" width="6" height="3" rx="1.5" fill="#E0F2F1"/>
  <circle cx="20" cy="23.5" r="2" fill="#E0F2F1"/>
</svg>